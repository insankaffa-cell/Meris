<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Happy Birthday!</title>\n    <style>\n        body {\n            background-color: #ffcccb;\n            font-family: Arial, sans-serif;\n            text-align: center;\n            padding: 50px;\n        }\n        h1 {\n            color: #ff6347;\n            font-size: 3em;\n            animation: bounce 1s infinite;\n        }\n        @keyframes bounce {\n            0%, 100% { transform: translateY(0); }\n            50% { transform: translateY(-30px); }\n        }\n        .button {\n            background-color: #ff6347;\n            border: none;\n            color: white;\n            padding: 10px 20px;\n            font-size: 1.5em;\n            cursor: pointer;\n            border-radius: 5px;\n            transition: background-color 0.3s;\n        }\n        .button:hover {\n            background-color: #ff4500;\n        }\n    </style>\n</head>\n<body>\n    <h1>Happy Birthday!</h1>\n    <p>Wishing you a day filled with laughter and fun!</p>\n    <button class=\"button\" onclick=\"alert('Have your cake and eat it too!')\">Click to Celebrate!</button>\n    <script>\n        document.addEventListener('DOMContentLoaded', function() {\n            const msg = [\n                'May your birthday be filled with cake!',\n                'Aged to perfection!',\n                'You are not getting older, just more distinguished!'\n            ];\n            alert(msg[Math.floor(Math.random() * msg.length)]);\n        });\n    </script>\n</body>\n</html>\n
