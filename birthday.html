<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Happy Birthday!</title>\n    <style>\n        body {\n            background-color: #ffcc00;\n            color: #333;\n            font-family: 'Arial', sans-serif;\n            text-align: center;\n            overflow: hidden;\n        }\n        h1 {\n            font-size: 50px;\n            animation: bounce 2s infinite;\n        }\n        @keyframes bounce {\n            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }\n            40% { transform: translateY(-30px); }\n            60% { transform: translateY(-15px); }\n        }\n        .confetti {\n            position: absolute;\n            top: 0;\n            left: 50%;\n            height: 100vh;\n            pointer-events: none;\n        }\n        #music {\n            display: none;\n        }\n    </style>\n</head>\n<body>\n    <h1>Happy Birthday!</h1>\n    <p>Wishing you a day full of joy and surprises!</p>\n    <button onclick="startConfetti()">Pop Some Balloons!</button>\n    <audio id="music" autoplay loop>\n        <source src="your-birthday-song.mp3" type="audio/mpeg">\n        Your browser does not support the audio tag.\n    </audio>\n    <script>\n        function startConfetti() {\n            const confetti = document.createElement('div');\n            confetti.className = 'confetti';\n            document.body.appendChild(confetti);\n            // Add confetti effect logic here (implement confetti animation)\n        }\n    </script>\n</body>\n</html>
